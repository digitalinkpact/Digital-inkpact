name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ai-assistant/requirements.txt
          pip install ruff pytest

      - name: Lint with ruff
        run: ruff check ai-assistant/

      - name: Check JSON config
        run: python -c "import json; json.load(open('ai-assistant/config/nanobot.json'))"

      - name: Check YAML policy
        run: |
          pip install pyyaml
          python -c "import yaml; yaml.safe_load(open('ai-assistant/security/policy.yaml'))"

      - name: Verify imports
        run: |
          cd ai-assistant
          python -c "from agent.bid_agent import BidAgent; print('bid_agent OK')"
          python -c "from agent.web_access import WebAccessController; print('web_access OK')"

      - name: Generate sample bid PDF
        run: |
          cd ai-assistant
          python samples/generate_sample_bid.py
          test -f samples/sample_bid_package.pdf

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit security scan
        run: bandit -r ai-assistant/agent/ ai-assistant/mcp/ -ll --skip B404,B603

      - name: Check for hardcoded secrets
        run: |
          # Fail if any API keys, tokens, or passwords are found
          ! grep -rn "api_key\|secret_key\|password\s*=" ai-assistant/agent/ ai-assistant/config/ \
            --include="*.py" --include="*.json" | grep -v "# " | grep -v "description"

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck on install.sh
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ai-assistant/
          additional_files: install.sh scripts/run.sh
